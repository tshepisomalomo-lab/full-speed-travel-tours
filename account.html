<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Braai Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .account-page {
            padding: 50px 0;
            background: #f8f8f8;
        }
        .form-container {
            background: #fff;
            width: 300px;
            height: 400px;
            position: relative;
            text-align: center;
            padding: 20px 0;
            margin: auto;
            box-shadow: 0 0 20px 0px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-btn {
            display: inline-block;
        }
        .form-btn span {
            font-weight: bold;
            padding: 0 30px;
            color: #555;
            cursor: pointer;
            width: 100px;
            display: inline-block;
        }
        .form-btn span.active {
            color: #ff523b; 
        }
        #Indicator {
            width: 100px;
            height: 3px;
            background: #ff523b;
            margin-top: 8px;
            transform: translateX(100px); 
            transition: transform 0.5s;
        }
        form {
            max-width: 300px;
            padding: 0 20px;
            position: absolute;
            top: 130px;
            transition: transform 0.5s;
        }
        #LoginForm {
            left: -300px; 
        }
        #RegForm {
            left: 0px; 
        }
        input {
            width: 100%;
            height: 30px;
            margin: 10px 0;
            padding: 0 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #ff523b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn:hover {
            background: #e04532;
        }
        a {
            color: #ff523b;
            text-decoration: none;
        }
       
        .form-container.active-login #LoginForm { transform: translateX(0); }
        .form-container.active-login #RegForm { transform: translateX(300px); }
        .form-container.active-register #LoginForm { transform: translateX(-300px); }
        .form-container.active-register #RegForm { transform: translateX(0); }
        .form-container.active-register #Indicator { transform: translateX(100px); }
        .form-container.active-login #Indicator { transform: translateX(0px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="small-container">
        <div class="navbar">
            <div class="logo">
                <a href="index.html">
                    <img src="images/Full speed logo.jpg" width="125px" alt="Full speed logo">
                </a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fleets.html">Our Fleets</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Account Page -->
    <div class="account-page">
        <div class="container">
            <div class="row">
                <div class="col-2">
                    <img src="images/buses.jpg" width="100%" >
                </div>
                
                <div class="col-2">
                    <div class="form-container">
                        <div class="form-btn">        
                            <span onclick="login()">Login</span>
                            <span onclick="register()">Register</span>
                            <hr id="Indicator">
                         </div>
                         <form id="LoginForm">
                            <input type="text" placeholder="Username">
                            <input type="password" placeholder="Password">
                            <button type="submit" class="btn">Login</button>
                            <a href="">Forgot Password</a>
                         </form>
                         <form id="RegForm">
                            <input type="text" placeholder="Username">
                            <input type="email" placeholder="Email">
                            <input type="password" placeholder="Password">
                            <button type="submit" class="btn">Register</button>
                         </form>

                         </div>
                     </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <div class="row">
                <div class="footer-col-2">
                    <h3><img src="images/Full speed logo.jpg" alt="Logo"></h3>
                    <p>Experience luxury travel and comfort</p>
                </div>
                <div class="footer-col-2">
                    <h3>Useful Links</h3>
                    <ul>
                        <li>Coupons</li>
                        <li>Blog Posts</li>
                        <li>Return Policy</li>
                        <li>Join Affiliate</li>
                    </ul>
                </div>
                <div class="footer-col-3">
                    <h3>Follow Us</h3>
                    <ul>
                        <li>Facebook</li>
                        <li>Instagram</li>
                        <li>X</li>
                    </ul>
                </div>
            </div>
            <hr>
            <p class="copyright">Copyright 2026 - Full Speed Travel & Tours</p>
        </div>
    </div>

    <!-- js for toggle Form -->
    <script>
        var LoginForm = document.getElementById("LoginForm")
        var RegForm = document.getElementById("RegForm")
        var Indicator = document.getElementById("Indicator")
        
     function register() {
        RegForm.style.transform = translateX(0px);
        LoginForm.style.transform = translateX(0px);
        Indicator.style.transform = translateX(100px)
     }

     function login() {
        RegForm.style.transform = translateX(300px)
        LoginForm.style.transform = translateX(300px)
        Indicator.style.transform = translateX(0px)
     }
     </script>

</body>
</html>
